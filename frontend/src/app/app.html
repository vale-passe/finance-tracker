<div class="app-shell">

      <!-- SIDEBAR (desktop) / BOTTOM-TAB (mobile) -->
      <nav class="nav">
        <div class="nav__brand">
          <span class="nav__brand-mark">FT</span>
          <span class="nav__brand-text">Finance Tracker</span>
        </div>

        <ul class="nav__links">
          @for (item of navItems; track item.path) {
            <li>
              <a
                [routerLink]="item.path"
                routerLinkActive="active"
                class="nav__link">
                <span class="nav__icon">{{ item.icon }}</span>
                <span class="nav__label">{{ item.label }}</span>
              </a>
            </li>
          }
        </ul>

        <button class="nav__theme" (click)="themeService.toggle()">
          <span class="nav__icon">
            {{ themeService.theme() === 'dark' ? '☀' : '☾' }}
          </span>
          <span class="nav__label">
            {{ themeService.theme() === 'dark' ? 'Chiaro' : 'Scuro' }}
          </span>
        </button>
      </nav>

      <!-- CONTENUTO -->
      <main class="content">
        <router-outlet />
      </main>

    </div>
